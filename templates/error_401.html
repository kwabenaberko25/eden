<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>401 Unauthorized - Eden Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .error-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .error-code {
            font-size: 72px;
            font-weight: bold;
            color: #f59e0b;
            margin-bottom: 15px;
            line-height: 1;
        }
        .error-title { font-size: 24px; font-weight: 600; color: #1f2937; margin-bottom: 10px; }
        .error-message { font-size: 16px; color: #6b7280; margin-bottom: 30px; line-height: 1.6; }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            margin: 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        @media (max-width: 640px) {
            .error-container { padding: 30px 20px; }
            .error-code { font-size: 48px; }
            .error-title { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">401</div>
        <div class="error-title">Unauthorized</div>
        <div class="error-message">
            You must log in to access this resource.
        </div>
        <a href="/login" class="btn btn-primary">Go to Login</a>
    </div>
</body>
</html>
