<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Eden Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .error-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        .error-status {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .error-title {
            font-size: 24px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 10px;
        }
        
        .error-message {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .error-details {
            background: #f3f4f6;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 4px;
            font-size: 13px;
            color: #374151;
            font-family: 'Courier New', monospace;
            overflow-x: auto;
        }
        
        .error-details-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #1f2937;
        }
        
        .error-context {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }
        
        .error-context-item {
            display: flex;
            margin-bottom: 10px;
        }
        
        .error-context-label {
            font-weight: 600;
            color: #374151;
            min-width: 120px;
        }
        
        .error-context-value {
            color: #6b7280;
            word-break: break-word;
        }
        
        .error-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: #e5e7eb;
            color: #1f2937;
        }
        
        .btn-secondary:hover {
            background: #d1d5db;
        }
        
        .error-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        
        @media (max-width: 640px) {
            .error-container {
                padding: 30px 20px;
            }
            
            .error-status {
                font-size: 36px;
            }
            
            .error-title {
                font-size: 20px;
            }
            
            .error-actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        
        <div class="error-status">{{ status_code }}</div>
        <div class="error-title">{{ title }}</div>
        <div class="error-message">{{ message }}</div>
        
        {% if details %}
        <div class="error-details">
            <div class="error-details-title">Error Details</div>
            {{ details }}
            
            {% if context %}
            <div class="error-context">
                <div class="error-details-title" style="margin-bottom: 10px;">Context</div>
                {% for key, value in context.items() %}
                <div class="error-context-item">
                    <div class="error-context-label">{{ key }}:</div>
                    <div class="error-context-value">{{ value }}</div>
                </div>
                {% endfor %}
            </div>
            {% endif %}
        </div>
        {% endif %}
        
        <div class="error-actions">
            <a href="/" class="btn btn-primary">Back Home</a>
            <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
        </div>
    </div>
</body>
</html>
