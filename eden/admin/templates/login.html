<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Eden Elite Admin</title>
    
    <!-- Design System Tokens -->
    <style>
        {{ theme.to_css()|safe }}
        
        body {
            background: radial-gradient(circle at top right, var(--eden-surface-container-high), var(--eden-surface));
            color: var(--eden-on-surface);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .glass-card {
            background: var(--eden-surface-container-low);
            backdrop-filter: blur(20px);
            box-shadow: var(--eden-shadow-xl);
        }

        .input-pill {
            background: var(--eden-surface-container);
            border: none;
            color: var(--eden-on-surface);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-pill:focus {
            background: var(--eden-surface-container-high);
            box-shadow: 0 0 0 2px var(--eden-primary-container);
            outline: none;
        }
        
        @font-face {
            font-family: 'Plus Jakarta Sans';
            font-style: normal;
            font-weight: 400 800;
            font-display: swap;
            src: url(https://fonts.gstatic.com/s/plusjakartasans/v8/L0x5DF4xlVMF-BfR8bXMIjhLq38.woff2) format('woff2');
        }
    </style>

    @eden_head(tailwind=False, alpine=False)
    <link rel="stylesheet" href="{{ url_for('admin:admin_static', path='css/admin.css') }}">
</head>
<body class="login-page">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="h-16 w-16 bg-primary rounded-2xl flex items-center justify-center text-white text-3xl font-bold mx-auto mb-4">
                E
            </div>
            <h1 class="brand-title">Eden <span class="text-primary">Elite</span></h1>
            <p class="text-muted text-sm mt-1">Infrastructure Management</p>
        </div>

        <!-- Login Card -->
        <div class="card login-card">
            <h2 class="card-title-lg mb-6">Sign In</h2>

            @if(error) {
            <div class="alert alert-error mb-6">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>@span(error)</span>
            </div>
            }

            <form action="/admin/login?next=@span(next_url)" method="POST" id="login-form">
                @csrf
                
                <div class="form-stack">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" required 
                            class="input"
                            placeholder="name@company.com" autofocus>
                    </div>

                    <div class="form-group">
                        <div class="flex-between mb-2">
                            <label>Password</label>
                            <a href="#" class="text-link text-xs">Forgot?</a>
                        </div>
                        <input type="password" name="password" required 
                            class="input"
                            placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                        <span>Sign Into Admin</span>
                        <i class="fa-solid fa-arrow-right text-xs"></i>
                    </button>
                </div>
            </form>
        </div>

        <p class="login-footer">
            &copy; 2026 Eden Framework. All rights reserved.<br>
            <span class="license-tag">Enterprise License Active</span>
        </p>
    </div>

    @eden_scripts
    <script>
        document.getElementById('login-form').addEventListener('submit', () => {
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
        });
    </script>
</body>
</html>
