<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Eden Elite Admin</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
    
    <!-- Design System Tokens -->
    <style>
        :root {
            --eden-primary: @span(theme.primary);
            --eden-primary-hover: @span(theme.primary_hover);
            --eden-primary-light: @span(theme.primary_light);
            --eden-primary-rgb: 99, 102, 241;
            --eden-primary-container: @span(theme.primary_light);
            --eden-bg-main: @span(theme.bg_main);
            --eden-bg-card: @span(theme.bg_card);
            --eden-text-main: @span(theme.text_main);
            --eden-text-muted: @span(theme.text_muted);
            --eden-border: @span(theme.border);
            --eden-success: @span(theme.success);
            --eden-error: @span(theme.error);
            --eden-error-rgb: 239, 68, 68;
            --eden-warning: @span(theme.warning);
            --eden-secondary-container: @span(theme.primary_light);
            --eden-on-secondary-container: @span(theme.primary);
            
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: 24px;
        }

        body {
            background-color: var(--eden-bg-main);
            background-image: 
                radial-gradient(circle at top right, var(--eden-primary-container), transparent 40%),
                radial-gradient(circle at bottom left, var(--eden-secondary-container), transparent 40%);
            color: var(--eden-text-main);
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 3rem 2.5rem;
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-box {
            width: 64px;
            height: 64px;
            background: var(--eden-primary);
            color: white;
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 16px var(--eden-primary-container);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-title {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 0.5rem;
        }

        .brand-subtitle {
            font-size: 0.875rem;
            color: var(--eden-text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            margin-left: 0.5rem;
            color: var(--eden-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-pill {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            color: white;
            font-size: 0.9375rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-pill:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--eden-primary);
            box-shadow: 0 0 0 4px rgba(var(--eden-primary-rgb), 0.15);
            transform: translateY(-1px);
        }

        .btn-elite {
            width: 100%;
            padding: 1rem;
            background: var(--eden-primary);
            color: white;
            border: none;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .btn-elite:hover {
            background: var(--eden-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -8px var(--eden-primary-container);
        }

        .btn-elite:active {
            transform: translateY(0);
        }

        .alert {
            background: rgba(var(--eden-error-rgb), 0.1);
            border: 1px solid var(--eden-error);
            color: var(--eden-error);
            padding: 1rem;
            border-radius: 1rem;
            font-size: 0.875rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .login-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--eden-text-muted);
            line-height: 1.6;
        }

        .license-tag {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.25rem 0.75rem;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border-radius: 2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>

    @eden_head(tailwind=False, alpine=False)
</head>
<body class="login-page">
    <div class="login-container">
        <!-- Logo & Header -->
        <div class="brand-header">
            <div class="logo-box">🌿</div>
            <h1 class="brand-title">Eden <span style="color: var(--eden-primary)">Elite</span></h1>
            <p class="brand-subtitle">Infrastructure Management</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card">
            @if(error) {
            <div class="alert">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>@span(error)</span>
            </div>
            }

            <form action="/admin/login?next=@span(next_url)" method="POST" id="login-form">
                @csrf
                
                <div class="form-group">
                    <label class="label">Email Address</label>
                    <input type="email" name="email" required 
                        class="input-pill"
                        placeholder="name@company.com" 
                        autofocus>
                </div>

                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label class="label" style="margin-bottom: 0">Password</label>
                        <a href="#" style="font-size: 0.75rem; color: var(--eden-primary); text-decoration: none; font-weight: 600;">Forgot?</a>
                    </div>
                    <input type="password" name="password" required 
                        class="input-pill"
                        placeholder="••••••••">
                </div>

                <button type="submit" class="btn-elite" id="login-btn">
                    <span>Sign Into Admin</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <p>&copy; 2026 Eden Framework. All rights reserved.</p>
            <span class="license-tag">Enterprise License Active</span>
        </div>
    </div>

    @eden_scripts
    <script>
        document.getElementById('login-form').addEventListener('submit', () => {
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i><span>Authenticating...</span>';
        });
    </script>
</body>
</html>
