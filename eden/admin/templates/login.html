<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Eden Elite Admin</title>
    
    <!-- Design System Tokens -->
    <style>
        {{ theme.to_css()|safe }}
        
        body {
            background: radial-gradient(circle at top right, var(--eden-surface-container-high), var(--eden-surface));
            color: var(--eden-on-surface);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .glass-card {
            background: var(--eden-surface-container-low);
            backdrop-filter: blur(20px);
            box-shadow: var(--eden-shadow-xl);
        }

        .input-pill {
            background: var(--eden-surface-container);
            border: none;
            color: var(--eden-on-surface);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-pill:focus {
            background: var(--eden-surface-container-high);
            box-shadow: 0 0 0 2px var(--eden-primary-container);
            outline: none;
        }
        
        @font-face {
            font-family: 'Plus Jakarta Sans';
            font-style: normal;
            font-weight: 400 800;
            font-display: swap;
            src: url(https://fonts.gstatic.com/s/plusjakartasans/v8/L0x5DF4xlVMF-BfR8bXMIjhLq38.woff2) format('woff2');
        }
    </style>

    @eden_head
</head>
<body class="h-full flex items-center justify-center p-6">
    <div class="w-full max-w-md" x-data="{ loading: false }">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="h-16 w-16 bg-gradient-to-tr from-primary to-primary-container rounded-2xl flex items-center justify-center text-on-primary text-3xl font-bold mx-auto mb-4 shadow-xl shadow-primary/20">
                E
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-on-surface">Eden <span class="text-primary">Elite</span></h1>
            <p class="text-on-surface-variant text-sm mt-1">Production-Grade Infrastructure Management</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-3xl p-8 md:p-10">
            <h2 class="text-xl font-semibold mb-6 text-on-surface">Sign In</h2>

            @if(error) {
            <div class="mb-6 p-4 rounded-xl bg-error/10 text-error text-sm flex items-center gap-3 animate-in fade-in slide-in-from-top-2">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>@span(error)</span>
            </div>
            }

            <form action="/admin/login?next=@span(next_url)" method="POST" @submit="loading = true">
                @csrf
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-black text-on-surface-variant uppercase tracking-widest mb-2 px-1">Email Address</label>
                        <input type="email" name="email" required 
                            class="w-full input-pill rounded-xl px-4 py-3 text-sm placeholder-on-surface-variant/40"
                            placeholder="name@company.com" autofocus>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-2 px-1">
                            <label class="text-xs font-black text-on-surface-variant uppercase tracking-widest">Password</label>
                            <a href="#" class="text-xs font-bold text-primary hover:text-primary-container transition-colors">Forgot?</a>
                        </div>
                        <input type="password" name="password" required 
                            class="w-full input-pill rounded-xl px-4 py-3 text-sm placeholder-on-surface-variant/40"
                            placeholder="••••••••">
                    </div>

                    <button type="submit" 
                        class="w-full bg-primary hover:bg-primary-container text-on-primary font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-primary/25 flex items-center justify-center gap-2 group"
                        :disabled="loading">
                        <template x-if="!loading">
                            <span class="flex items-center gap-2">
                                Sign Into Admin
                                <i class="fa-solid fa-arrow-right text-xs group-hover:translate-x-1 transition-transform"></i>
                            </span>
                        </template>
                        <template x-if="loading">
                            <i class="fa-solid fa-circle-notch fa-spin"></i>
                        </template>
                    </button>
                </div>
            </form>
        </div>

        <p class="text-center text-on-surface-variant/60 text-xs mt-8">
            &copy; 2026 Eden Framework. All rights reserved.<br>
            <span class="font-bold opacity-50 uppercase tracking-widest">Enterprise License Active</span>
        </p>
    </div>

    @eden_scripts
</body>
</html>
