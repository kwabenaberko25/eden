<!DOCTYPE html>
<html lang="en" class="@if(config.theme == 'dark') {dark}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@yield('title', config.title)</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    @if(config.custom_css) {
    <link rel="stylesheet" href="{{ config.custom_css }}">
    }
    <style>
        [x-cloak] { display: none !important; }
        .htmx-indicator {
            opacity: 0;
            transition: opacity 0.3s ease-in;
        }
        .htmx-request .htmx-indicator {
            opacity: 1;
        }
        .htmx-request.htmx-indicator {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-semibold text-gray-900 dark:text-white">
                        {{ config.title }}
                    </h1>
                </div>
                <div class="flex items-center space-x-4">
                    @if(config.enable_realtime) {
                    <div class="flex items-center space-x-2">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-sm text-gray-600 dark:text-gray-400">Live</span>
                    </div>
                    }
                    <button class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <div class="px-4 py-6 sm:px-0">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                @for(model_name, panel in panels.items()) {
                <div class="bg-white dark:bg-gray-800 overflow-hidden shadow rounded-lg">
                    <div class="p-5">
                        <div class="flex items-center">
                            <div class="flex-shrink-0">
                                <svg class="h-8 w-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                            </div>
                            <div class="ml-5 w-0 flex-1">
                                <dl>
                                    <dt class="text-sm font-medium text-gray-500 dark:text-gray-400 truncate">
                                        {{ model_name|title }}
                                    </dt>
                                    <dd class="text-lg font-medium text-gray-900 dark:text-white">
                                        <span hx-get="/panel/{{ model_name }}/count" hx-trigger="load, every 30s" hx-target="this">
                                            <span class="htmx-indicator">Loading...</span>
                                        </span>
                                        records
                                    </dd>
                                </dl>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 dark:bg-gray-700 px-5 py-3">
                        <div class="text-sm">
                            <a href="/panel/{{ model_name }}/" class="font-medium text-indigo-600 dark:text-indigo-400 hover:text-indigo-500">
                                View all →
                            </a>
                        </div>
                    </div>
                </div>
                }
            </div>
        </div>
    </main>

    @if(config.custom_js) {
    <script src="{{ config.custom_js }}"></script>
    }

    <script>
        // Auto-refresh dashboard data
        @if(config.enable_realtime) {
        setInterval(() => {
            htmx.trigger('body', 'refresh-dashboard');
        }, 30000);
        }
    </script>
</body>
</html>
