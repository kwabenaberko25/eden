<div class="bg-gray-800/90 backdrop-blur-md border border-gray-700 rounded-xl overflow-hidden
            transition-all duration-300
            @if (hoverable) {
            hover:shadow-lg hover:shadow-blue-500/10 hover:-translate-y-0.5
            }
">
  @if (title or subtitle) {
  <div class="px-6 py-4 border-b border-gray-700/50 flex items-center justify-between">
    <div>
      @if (title) {<h3 class="text-lg font-semibold text-slate-100">{{ title }}</h3>}
      @if (subtitle) {<p class="text-sm text-slate-400 mt-0.5">{{ subtitle }}</p>}
    </div>
    @if (slots.action) {
    <div>
      {{ slots.action }}
    </div>
    }
  </div>
  }
  <div class="px-6 py-5 text-slate-300">
    {{ slots.default }}
  </div>
  @if (slots.footer) {
  <div class="px-6 py-3 bg-gray-900/40 border-t border-gray-700/50">
    {{ slots.footer }}
  </div>
  }
</div>
