<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <title>@block("title") { Eden App }</title>
    {{ eden_head() }}
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif; }
    </style>
    @block("head") {}
</head>
<body class="bg-[#0F172A] text-slate-200 min-h-screen antialiased"
      hx-boost="true">

    @block("body") {
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        @block("content") {}
    </main>
    }

    {{ eden_scripts() }}
    @block("scripts") {}
</body>
</html>
