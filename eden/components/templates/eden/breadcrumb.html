<nav class="flex items-center text-sm text-slate-400" aria-label="Breadcrumb">
  <ol class="flex items-center gap-1.5">
    @for (item in items) {
    <li class="flex items-center gap-1.5">
      @if (not loop.last) {
      <a href="{{ item.url }}" class="hover:text-blue-400 transition-colors duration-200">{{ item.label }}</a>
      <span class="text-slate-600">{{ separator }}</span>
      } @else {
      <span class="text-slate-200 font-medium" aria-current="page">{{ item.label }}</span>
      }
    </li>
    }
  </ol>
</nav>
