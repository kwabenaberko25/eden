<div class="{{ bg }} {{ border }} {{ text }} border rounded-lg p-4 transition-all duration-300"
     role="alert"
     @if (dismissible) {
       x-data="{ open: true }" x-show="open"
     }
>
  <div class="flex items-center gap-3">
    <span class="text-lg flex-shrink-0">{{ icon }}</span>
    <div class="flex-1">{{ slots.default }}</div>
    @if (dismissible) {
    <button @click="open = false"
            class="text-current opacity-60 hover:opacity-100 transition-opacity duration-200 cursor-pointer">
      ✕
    </button>
    }
  </div>
</div>
