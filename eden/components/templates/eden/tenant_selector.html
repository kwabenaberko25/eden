{# Eden — Multi-Tenant Switcher Component #}
@props(['tenants' => [], 'current' => null, 'glass' => true, 'search' => false])

<div 
    x-data="{ 
        open: false, 
        query: '', 
        allTenants: {{ tenants | tojson if tenants else '[]' }},
        
        get filtered() {
            if (!this.query) return this.allTenants;
            return this.allTenants.filter(t => t.name.toLowerCase().includes(this.query.toLowerCase()));
        }
    }"
    class="relative inline-block w-full max-w-[240px]"
>
    <!-- Display Button -->
    <button 
        x-on:click="open = !open"
        x-on:click.outside="open = false"
        class="flex items-center justify-between w-full px-4 py-2 text-left rounded-xl border border-white/10 transition-all duration-300
               @if (glass) { bg-slate-900/60 backdrop-blur-xl hover:bg-slate-800/80 } 
               @unless (glass) { bg-slate-900 hover:border-lime-500/50 }"
    >
        <div class="flex items-center gap-3 overflow-hidden">
            <span class="flex-shrink-0 w-7 h-7 flex items-center justify-center rounded-lg bg-lime-500/10 text-lime-400 border border-lime-500/20 font-bold text-xs uppercase">
                {{ (current.name[:2] if current else 'TS') | upper }}
            </span>
            <div class="flex flex-col min-w-0">
                <span class="text-sm font-bold text-white truncate">{{ (current.name if current else 'Switch Workspace') }}</span>
                <span class="text-[10px] text-slate-500 tracking-tighter uppercase font-medium">Organization</span>
            </div>
        </div>
        <span class="material-symbols-outlined text-slate-500 text-lg transition-transform duration-300" :class="open ? 'rotate-180' : ''">expand_more</span>
    </button>

    <!-- Dropdown List -->
    <div 
        x-show="open"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 translate-y-2 scale-95"
        x-transition:enter-end="opacity-100 translate-y-0 scale-100"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100 translate-y-0 scale-100"
        x-transition:leave-end="opacity-0 translate-y-2 scale-95"
        class="absolute z-[110] left-0 right-0 mt-2 p-2 rounded-2xl bg-slate-900/90 backdrop-blur-2xl border border-white/10 shadow-2xl shadow-black/80"
        x-cloak
    >
        @if (search) {
        <div class="px-2 pb-2 mb-2 border-b border-white/5">
            <div class="relative group">
                <span class="absolute left-2.5 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-500 text-base group-focus-within:text-lime-400">search</span>
                <input 
                    type="text" 
                    x-model="query"
                    placeholder="Search workspace..."
                    class="w-full bg-slate-950/50 border border-white/5 pl-9 pr-3 py-1.5 rounded-lg text-xs text-white focus:outline-none focus:ring-1 focus:ring-lime-400/50 transition-all font-medium"
                >
            </div>
        </div>
        }

        <div class="max-h-[200px] overflow-y-auto space-y-1 scrollbar-thin scrollbar-thumb-white/5">
            <template x-for="tenant in filtered" :key="tenant.id">
                <a 
                    :href="'/switch/' + tenant.id"
                    class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-lime-500/10 group transition-all"
                >
                    <span class="w-6 h-6 flex items-center justify-center rounded bg-slate-800 text-slate-400 text-[10px] font-bold group-hover:text-lime-400 transition-colors" x-text="tenant.name.substring(0,2).toUpperCase()"></span>
                    <span class="text-xs font-medium text-slate-300 group-hover:text-white" x-text="tenant.name"></span>
                    <span x-show="tenant.id === '{{ current.id if current else '' }}'" class="ml-auto material-symbols-outlined text-sm text-lime-400">check_circle</span>
                </a>
            </template>
        </div>
        
        <div class="mt-2 pt-2 border-t border-white/5">
            <a href="/organizations/new" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-800 transition-all text-slate-400 hover:text-white">
                <span class="material-symbols-outlined text-sm">add_circle</span>
                <span class="text-xs font-semibold">New Organization</span>
            </a>
        </div>
    </div>
</div>
