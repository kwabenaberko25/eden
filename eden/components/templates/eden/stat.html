{# Eden — Stat Card Component Template #}
<div class="bg-gray-800/90 backdrop-blur-md border border-gray-700 rounded-xl p-5
            hover:border-gray-600 hover:-translate-y-0.5 transition-all duration-300">

  <div class="flex items-start justify-between">

    {# Left: Label + Value #}
    <div class="flex-1 min-w-0">
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest truncate">{{ label }}</p>
      <p class="mt-1.5 text-3xl font-bold text-slate-50 tracking-tight">{{ value }}</p>

      @if (description) {
      <p class="mt-1 text-xs text-slate-500">{{ description }}</p>
      }
    </div>

    {# Right: Icon #}
    @if (icon) {
    <div class="ml-4 flex-shrink-0 w-12 h-12 rounded-xl bg-blue-600/20 border border-blue-500/20
                flex items-center justify-center text-2xl">
      {{ icon }}
    </div>
    }

  </div>

  {# Trend Badge #}
  @if (change) {
  <div class="mt-4 flex items-center gap-1.5">
    <span class="text-sm font-semibold {{ trend_color }}">{{ trend_icon }} {{ change }}</span>
    <span class="text-xs text-slate-500">vs last period</span>
  </div>
  }

</div>
