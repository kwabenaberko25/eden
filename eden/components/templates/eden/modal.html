<div 
  x-data="{ open: false }" 
  x-on:eden:modal-open.window="if ($event.detail.id === '{{ id }}') open = true"
  x-on:eden:modal-close.window="if ($event.detail.id === '{{ id }}') open = false"
  x-on:keydown.escape.window="open = false"
  class="relative z-[100]"
>
    <!-- Trigger -->
    @if (slots.trigger) {
    <div x-on:click="open = true" class="inline-block">
        {{ slots.trigger }}
    </div>
    }

    <!-- Modal Portal -->
    <template x-teleport="body">
        <div 
            x-show="open" 
            class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6"
            x-cloak
        >
            <!-- Backdrop -->
            <div 
                x-show="open"
                x-transition:enter="ease-out duration-300"
                x-transition:enter-start="opacity-0"
                x-transition:enter-end="opacity-100"
                x-transition:leave="ease-in duration-200"
                x-transition:leave-start="opacity-100"
                x-transition:leave-end="opacity-0"
                class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm transition-opacity" 
                x-on:click="open = false"
            ></div>

            <!-- Panel -->
            <div 
                x-show="open"
                x-transition:enter="ease-out duration-300"
                x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave="ease-in duration-200"
                x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                class="relative {{ size_class }} w-full transform overflow-hidden rounded-2xl bg-slate-900/80 backdrop-blur-xl border border-white/10 shadow-2xl shadow-black/50 transition-all"
            >
                @if (title) {
                <div class="flex items-center justify-between px-6 py-4 border-b border-white/5">
                    <h2 class="text-xl font-bold bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">
                        {{ title }}
                    </h2>
                    <button x-on:click="open = false" class="text-slate-400 hover:text-white transition-colors p-1">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                }

                <div class="px-6 py-6 text-slate-300">
                    {{ slots.default }}
                </div>

                @if (slots.footer) {
                <div class="px-6 py-4 bg-white/5 border-t border-white/5 flex justify-end gap-3">
                    {{ slots.footer }}
                </div>
                }
            </div>
        </div>
    </template>
</div>
