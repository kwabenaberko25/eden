<div class="relative inline-block group">
  {{ slots.default }}
  <div class="absolute {{ pos_class }} pointer-events-none opacity-0 group-hover:opacity-100
              transition-opacity duration-200 z-50 whitespace-nowrap">
    <div class="bg-gray-900 text-slate-200 text-xs font-medium px-3 py-1.5 rounded-lg
                shadow-lg border border-gray-700">
      {{ text }}
    </div>
  </div>
</div>
