<div x-data="{ activeTab: {{ active }} }">
  <!-- Tab headers -->
  <div class="flex border-b border-gray-700 gap-1" role="tablist">
    @for (tab in tabs) {
    <button @click="activeTab = {{ loop.index0 }}"
            :class="activeTab === {{ loop.index0 }}
              ? 'border-blue-500 text-blue-400'
              : 'border-transparent text-slate-400 hover:text-slate-200 hover:border-slate-500'"
            class="px-4 py-2.5 text-sm font-medium border-b-2 transition-all duration-200 -mb-px cursor-pointer"
            role="tab">
      {{ tab.label }}
    </button>
    }
  </div>
  <!-- Tab panels -->
  @for (tab in tabs) {
  <div x-show="activeTab === {{ loop.index0 }}"
       x-transition:enter="transition-opacity duration-200"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       class="py-4 text-slate-300"
       role="tabpanel">
    @if (slots['tab_' ~ tab.id]) { {{ slots['tab_' ~ tab.id] }} }
  </div>
  }
</div>
