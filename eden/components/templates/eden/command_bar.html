{# Eden — Global Command Bar / Search (CMD+K) #}
<div 
    x-data="{ 
        open: false, 
        query: '', 
        results: [], 
        searching: false,
        
        init() {
            window.addEventListener('keydown', (e) => {
                if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                    e.preventDefault();
                    this.open = !this.open;
                }
            });
        },
        
        async search() {
            if (!this.query) {
                this.results = [];
                return;
            }
            this.searching = true;
            try {
                // Eden Semantic AI Search Mock/Target
                // In production, this calls VectorModel.semantic_search
                const res = await fetch('/api/search?q=' + encodeURIComponent(this.query));
                if (res.ok) {
                    this.results = await res.json();
                }
            } catch (e) {
                console.error('Eden Secure Search Encountered an Error:', e);
            } finally {
                this.searching = false;
            }
        }
    }"
    class="relative z-[200]"
>
    {# Overlay #}
    <template x-teleport="body">
        <div 
            x-show="open" 
            x-transition:enter="ease-out duration-300"
            x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100"
            x-transition:leave="ease-in duration-200"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0"
            class="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-start justify-center pt-[15vh] px-4"
            x-cloak
            x-on:keydown.escape.window="open = false"
            x-on:click.self="open = false"
        >
            {# Command Panel #}
            <div 
                class="w-full max-w-2xl bg-slate-900/90 backdrop-blur-2xl rounded-3xl border border-white/10 shadow-[0_0_50px_rgba(163,230,53,0.15)] overflow-hidden shadow-2xl shadow-black/80"
                x-on:click.stop
            >
                {# Search Input #}
                <div class="relative group">
                    <span class="absolute left-6 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 text-2xl group-focus-within:text-lime-400 group-hover:scale-110 transition-all duration-300">search</span>
                    <input 
                        type="text" 
                        x-model="query"
                        @input.debounce.300ms="search()"
                        placeholder="Search workspace, documents, or navigation (CMD+K)..."
                        class="w-full bg-transparent pl-16 pr-6 py-6 text-lg text-white font-medium focus:outline-none placeholder-slate-500"
                        x-ref="searchInput"
                        x-init="$watch('open', value => value && $nextTick(() => $refs.searchInput.focus()))"
                    >
                    {# Loading Spinner #}
                    <div x-show="searching" class="absolute right-6 top-1/2 -translate-y-1/2">
                        <svg class="animate-spin h-5 w-5 text-lime-400" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    </div>
                </div>

                {# Results Area #}
                <div class="max-h-[60vh] overflow-y-auto p-2 border-t border-white/5 bg-black/10 scrollbar-thin scrollbar-thumb-white/10">
                    <template x-if="!query">
                        <div class="p-6 text-center">
                            <p class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-6">Quick Navigation</p>
                            <div class="grid grid-cols-2 gap-3">
                                <a href="/dashboard" class="flex flex-col items-center gap-2 p-4 rounded-2xl bg-white/5 border border-white/5 hover:bg-lime-500/10 hover:border-lime-500/20 group transition-all duration-300">
                                    <span class="material-symbols-outlined text-3xl text-slate-400 group-hover:text-lime-400 group-hover:scale-110 transition-all">grid_view</span>
                                    <span class="text-xs font-bold text-slate-300 group-hover:text-white">Dashboard</span>
                                </a>
                                <a href="/settings" class="flex flex-col items-center gap-2 p-4 rounded-2xl bg-white/5 border border-white/5 hover:bg-lime-500/10 hover:border-lime-500/20 group transition-all duration-300">
                                    <span class="material-symbols-outlined text-3xl text-slate-400 group-hover:text-lime-400 group-hover:scale-110 transition-all">settings</span>
                                    <span class="text-xs font-bold text-slate-300 group-hover:text-white">Settings</span>
                                </a>
                            </div>
                        </div>
                    </template>

                    <template x-if="query && results.length > 0">
                        <div class="space-y-1 p-2">
                             <template x-for="result in results" :key="result.id">
                                <a 
                                    :href="result.url"
                                    class="flex items-center gap-4 p-4 rounded-2xl hover:bg-lime-500/10 border border-transparent hover:border-lime-500/10 group transition-all duration-200"
                                >
                                    <div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-slate-400 group-hover:bg-slate-700/50 group-hover:text-lime-400 group-hover:scale-105 transition-all">
                                        <span class="material-symbols-outlined text-xl" x-text="result.icon || 'description'"></span>
                                    </div>
                                    <div class="flex flex-col overflow-hidden">
                                        <span class="text-sm font-bold text-white truncate" x-text="result.title"></span>
                                        <span class="text-[10px] text-slate-500 uppercase font-semibold tracking-tighter" x-text="result.category || 'Record'"></span>
                                    </div>
                                    <span class="ml-auto material-symbols-outlined text-slate-600 text-lg opacity-0 group-hover:opacity-100 group-hover:translate-x-1 transition-all">arrow_forward</span>
                                </a>
                             </template>
                        </div>
                    </template>

                    <template x-if="query && results.length === 0 && !searching">
                         <div class="p-12 text-center opacity-40">
                            <span class="material-symbols-outlined text-5xl mb-4 block scale-125 opacity-30">database_off</span>
                            <h3 class="text-sm font-bold text-white mb-1 uppercase tracking-widest">No Intelligence Found</h3>
                            <p class="text-xs text-slate-500 font-medium">Try searching for keywords or specific document IDs</p>
                        </div>
                    </template>
                </div>

                {# Footer / Help #}
                <div class="px-6 py-4 bg-lime-500/5 border-t border-white/5 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-1.5 opacity-40">
                            <span class="px-1.5 py-0.5 rounded-md bg-slate-800 border border-white/10 text-[9px] font-bold text-white uppercase shadow-sm shadow-black/80">Esc</span>
                            <span class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">Close</span>
                        </div>
                        <div class="flex items-center gap-1.5 opacity-40">
                             <span class="px-1.5 py-0.5 rounded-md bg-slate-800 border border-white/10 text-[9px] font-bold text-white uppercase shadow-sm shadow-black/80">Enter</span>
                            <span class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">Select</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 group cursor-pointer">
                        <span class="text-[9px] font-bold text-lime-400 uppercase tracking-widest opacity-60 group-hover:opacity-100 transition-opacity">Powered by Eden Semantic AI</span>
                        <div class="w-1.5 h-1.5 rounded-full bg-lime-400 animate-pulse"></div>
                    </div>
                </div>
            </div>
        </div>
    </template>
</div>
