name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run Ruff Check
        run: ruff check .
      - name: Run Ruff Format Check
        run: ruff format --check .

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[all,dev]"
      - name: Run Tests
        run: |
          # Use -v for verbose output and --maxfail=10 to avoid excessive logs if something breaks
          pytest -v --maxfail=10
