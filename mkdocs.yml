site_name: Eden Framework
site_description: A batteries-included async Python web framework
site_url: https://eden-framework.dev
repo_url: https://github.com/kwabenaberko25/eden
repo_name: kwabenaberko25/eden
use_directory_urls: false

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - I. Getting Started:
    - The Eden Ethos: getting-started/philosophy.md
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Example Snippets: getting-started/example-snippets.md
    - Killer Features: guides/killer-features.md
    - Development Cycle: guides/development-cycle.md
    - Project Structure: getting-started/structure.md
    - Learning Path: getting-started/learning-path.md
  - II. Core Application Framework:
    - Core Application: guides/core-app.md
    - Routing System: guides/routing.md
    - Advanced Routing: guides/advanced-routing.md
    - Context Variables: guides/context-variables.md
    - Dependency Injection: guides/dependency-injection.md
    - Middleware & Security: guides/middleware.md
    - Exception Handling: guides/exceptions.md
    - Sessions: guides/sessions.md
    - Requests & Responses: guides/requests-responses.md
    - Service Layer: guides/services.md
    - Caching: guides/caching.md
    - CLI Suite: guides/cli.md
  - III. Database & ORM:
    - ORM Overview: guides/orm.md
    - QuerySet & Lookups: guides/orm-querying.md
    - Relationship Patterns: guides/orm-relationships.md
    - Transactions & Atomicity: guides/orm-transactions.md
    - Migrations: guides/orm-migrations.md
    - JSON Functionality: guides/json.md
  - IV. Security & Authentication:
    - Auth Overview: guides/auth.md
    - Role-Based Access (RBAC): guides/auth-rbac.md
    - Social Login (OAuth): guides/auth-oauth.md
    - Multi-Backend Auth: guides/multi-backend-auth.md
    - Multi-Tenancy Patterns: guides/tenancy.md
    - Tenant Persistence (PostgreSQL): guides/tenancy-postgres.md
    - Tenant Config & Lifecycle: guides/tenant-configuration.md
    - Security Best Practices: guides/security.md
    - CSRF Protection: guides/csrf-protection.md
  - V. UI & Frontend Integration:
    - Templating System: guides/templating.md
    - Directives Guide: guides/DIRECTIVES_USAGE_GUIDE.md
    - Directives Troubleshooting: guides/DIRECTIVES_TROUBLESHOOTING.md
    - Server-Side Components: guides/components.md
    - Forms & Validation: guides/forms.md
    - Advanced FormField API: guides/formfield-api.md
    - HTMX Integration: guides/htmx.md
    - Internationalization (i18n): guides/i18n.md
  - VI. Background Tasks & Real-time:
    - Background Tasks: guides/background-tasks.md
    - WebSockets & Streaming: guides/websockets.md
    - Real-time Operations: guides/realtime.md
    - WebSocket Auth: guides/websocket-auth.md
  - VII. Storage & Assets:
    - File Storage: guides/storage.md
    - Asset Pipeline: guides/assets.md
    - Optional Extras: guides/optional-extras.md
  - VIII. Testing & Debugging:
    - Testing Framework: guides/testing.md
    - Troubleshooting & FAQ: guides/troubleshooting.md
    - Performance Tuning: guides/performance.md
  - IX. Built-in Admin & Audit:
    - Admin Panel: guides/admin.md
    - Audit System: guides/audit.md
    - Logging & Telemetry: guides/logging.md
  - X. Deployment & Operations:
    - Deployment Guide: guides/deployment.md
    - API Standards: guides/api.md
    - OpenAPI & Swagger: guides/openapi.md
    - Payment Integration: guides/payments.md
  - 🍱 Elite Recipes:
    - Real-time UI Updates: recipes/realtime-updates.md
    - OAuth Social Auth: recipes/social-auth.md
    - Multi-Tenant Isolation: recipes/tenant-isolation.md
  - Tutorial (Task-Based):
    - 1. Environment Setup: tutorial/task1_setup.md
    - 2. App Configuration: tutorial/task2_core.md
    - 3. Data Models (ORM): tutorial/task3_orm.md
    - 4. Routes & Views: tutorial/task4_routing.md
    - 5. Premium Templating: tutorial/task5_templating.md
    - 6. Forms & Validation: tutorial/task6_forms.md
    - 7. Security & RBAC: tutorial/task7_security.md
    - 8. SaaS Features: tutorial/task8_saas.md
    - 9. Deployment: tutorial/task9_deployment.md
    - 10. Testing: tutorial/task10_testing.md

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
