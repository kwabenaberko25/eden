site_name: Eden Framework
site_description: A batteries-included async Python web framework
site_url: https://eden-framework.dev
repo_url: https://github.com/eden-framework/eden
repo_name: eden-framework/eden
use_directory_urls: false

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - The Eden Ethos: getting-started/philosophy.md
    - Installation: getting-started/installation.md
    - Learning Path: getting-started/learning-path.md
    - Quick Start: getting-started/quickstart.md
    - Example Snippets: getting-started/example-snippets.md
    - Project Structure: getting-started/structure.md
  - Tutorial (Task-Based):
    - 1. Environment Setup: tutorial/task1_setup.md
    - 2. App Configuration: tutorial/task2_core.md
    - 3. Data Models (ORM): tutorial/task3_orm.md
    - 4. Routes & Views: tutorial/task4_routing.md
    - 5. Premium Templating: tutorial/task5_templating.md
    - 6. Forms & Validation: tutorial/task6_forms.md
    - 7. Security & RBAC: tutorial/task7_security.md
    - 8. SaaS Features: tutorial/task8_saas.md
    - 9. Deployment: tutorial/task9_deployment.md
    - 10. Testing: tutorial/task10_testing.md
  - Guides:
    - Core Application: guides/core-app.md
    - Routing System: guides/routing.md
    - Advanced Routing: guides/advanced-routing.md
    - Server-Side Components: guides/components.md
    - Context Variables: guides/context-variables.md
    - Dependencies: guides/dependencies.md
    - WebSockets: guides/websockets.md
    - WebSocket Auth: guides/websocket-auth.md
    - Middleware & Security: guides/middleware.md
    - CSRF Protection: guides/csrf-protection.md
    - Sessions: guides/sessions.md
    - HTMX Integration: guides/htmx.md
    - Exception Handling: guides/exceptions.md
    - OpenAPI & Swagger: guides/openapi.md
    - CLI Suite: guides/cli.md
    - Database & ORM: guides/orm.md
    - Authentication: guides/auth.md
    - Multi-Backend Auth: guides/multi-backend-auth.md
    - Caching & Performance: guides/caching.md
    - Templates: guides/templating.md
    - "📝 Templating Directives": guides/DIRECTIVES_USAGE_GUIDE.md
    - "🔧 Directives Troubleshooting": guides/DIRECTIVES_TROUBLESHOOTING.md
    - Forms & Validation: guides/forms.md
    - FormField API: guides/formfield-api.md
    - Multi-Tenancy: guides/tenancy.md
    - Multi-Tenancy (PostgreSQL): guides/tenancy-postgres.md
    - Tenant Configuration: guides/tenant-configuration.md
    - Internationalization: guides/i18n.md
    - Background Tasks: guides/background-tasks.md
    - Integrated Services: guides/services.md
    - Optional Extras: guides/optional-extras.md
    - Admin Panel: guides/admin.md
    - API Best Practices: guides/api.md
    - Payment Integration: guides/payments.md
    - Deployment & Observability: guides/deployment.md
    - 🚀 Killer Features: guides/killer-features.md
    - 🔒 Security Best Practices: guides/security.md
    - 🚀 Performance Tuning: guides/performance.md
    - 🧪 Testing: guides/testing.md
    - 🔧 Troubleshooting & FAQ: guides/troubleshooting.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
