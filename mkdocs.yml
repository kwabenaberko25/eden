site_name: Eden Framework
site_description: A batteries-included async Python web framework
site_url: https://eden-framework.dev
repo_url: https://github.com/kwabenaberko25/eden
repo_name: kwabenaberko25/eden
use_directory_urls: false

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Foundations:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Learning Path: getting-started/learning-path.md
    - Project Structure: getting-started/structure.md
    - Killer Features: guides/killer-features.md

  - The Eden Zen:
    - Philosophy & Ethos: getting-started/philosophy.md
    - Core Architecture: guides/philosophy.md
    - Development Lifecycle: guides/development-cycle.md

  - Core Application:
    - Core App Instance: guides/core-app.md
    - Routing System: guides/routing.md
    - Advanced Routing: guides/advanced-routing.md
    - Context Variables: guides/context-variables.md
    - Dependency Injection: guides/dependency-injection.md
    - Middleware Stack: guides/middleware.md
    - Exception Handling: guides/exceptions.md
    - Sessions: guides/sessions.md
    - Requests & Responses: guides/requests-responses.md
    - Service Layer Pattern: guides/services.md
    - API Versioning: guides/api-versioning.md
    - CLI Suite: guides/cli.md

  - Database & ORM:
