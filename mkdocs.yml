site_name: Eden Framework
site_description: A batteries-included async Python web framework
site_url: https://eden-framework.dev
repo_url: https://github.com/eden-framework/eden
repo_name: eden-framework/eden

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Project Structure: getting-started/structure.md
  - Guides:
    - Routing: guides/routing.md
    - Database & ORM: guides/orm.md
    - Authentication: guides/auth.md
    - Middleware: guides/middleware.md
    - Templates: guides/templating.md
    - Forms: guides/forms.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
